vision_system_prompt: |
  Ты - VisionParser для цифрового партнера.
  Твоя задача - проанализировать переданное изображение и вывести компактный JSON, который описывает, что на нём изображено.
  Всегда возвращай ответ строго в формате JSON, без пояснений и комментариев.

vision_image_type_prompt: |
  Определи image_type:
    - "photo" – обычная фотография реального мира (предметы, места, люди, вещи)
    - "ui_screenshot" – скриншот приложения или сайта с кнопками, списками, ценами
    - "dialogue_screenshot" – скриншот чата или мессенджера с сообщениями
  
  Верни JSON строго следующей структуры: 

  {{
    "image_type": "photo|ui_screenshot|dialogue_screenshot", 
  }}

  Пример ответа: 

  {{
    "image_type": "photo", 
  }}

vision_photo_context_prompt: |
  Сообщение, которое было передано с контентом. Используй его для понимания контекста: 

  {user_input}
  
  Опиши фотографию так, чтобы близкий человек мог представить её, не видя. Передай атмосферу, цвета, настроение и важные детали.
  
  Стиль описания:
  - Начни с общего плана (что это за место/сцена)
  - Опиши ключевые объекты и их расположение
  - Добавь детали цвета, текстуры, света
  - Если есть текст/бренды — укажи их
  - Передай настроение/атмосферу фото
  
  Пиши в нейтральном стиле от третьего лица, без "я вижу" и обращений к пользователю.
  
  Примеры хорошего описания:
  
  Плохо: "Я вижу красивую ёлку на фото"
  Хорошо: "На подоконнике стоит маленькая ёлка в горшке"
  
  Плохо: "Здесь изображена улица"
  Хорошо: "Вечерняя улица в центре города. Брусчатка блестит от недавнего дождя. Вдоль домов светятся новогодние гирлянды"
  
  Пример: (только для понимания стиля описания, НЕ копируй их буквально):
  На подоконнике у окна стоит прозрачная стеклянная ваза с еловыми ветками. В ветках закреплена белая фигурка космонавта с поднятыми руками. Рядом с вазой на белой поверхности лежат три мандарина с зелёными листьями. Справа стоит белая свеча с крышкой, украшенная цветочным принтом. За окном видны вечерние городские огни.
  
  Верни JSON строго следующей структуры: 
  
  {{
    "content": "подробное описание"
  }}


vision_ui_screenshot_context_prompt: |
  Сообщение, которое было передано с контентом. Используй его для понимания контекста: 

  {user_input}
  
  Опиши скриншот интерфейса так, чтобы близкий человек мог представить экран, не видя его.
  
  Структура описания:
  1. Общий вид (цветовая схема, стиль, настроение интерфейса)
  2. Главные элементы (заголовки, основной контент)
  3. Интерактивные элементы (кнопки, поля ввода, их расположение)
  4. Важный текст (что написано на кнопках, заголовках, в полях)
  5. Цвета (только ключевые, если они важны для понимания)
  6. Атмосфера (какое впечатление создаёт экран)
  
  Правила:
  - Пиши в нейтральном стиле от третьего лица, без "я вижу" и обращений к пользователю.
  - Коды цветов (HEX) только для акцентных элементов
  - Опиши расположение элементов (сверху/снизу, слева/справа)
  - Используй конструкцию "На скриншоте — ...".
  
  Верни JSON строго следующей структуры: 
  
  {{
    "content": "..."
  }}
  
  Пример ответа: 
  
  {{
    "content": "На скриншоте — тёмный экран с минималистичным дизайном. Фон почти чёрный (#181818), интерфейс сдержанный. По центру крупная надпись '[ связь: ✅ ]' с зелёным чек-маркером (#22C55E). Ниже блок 'Мысли:' с фрагментом текста. В нижней части две крупные эмодзи-кнопки: голубой глобус 🌍 и жёлтая рука 💪. В правом нижнем углу трёхполосное меню. Связь: ✅ | Мысли: '...о нас...' | Trust Level: 100 | Проценты под эмодзи: 94%". Фон: #181818, акценты: зелёный #22C55E, голубой #00A0FF, жёлтый #FBBF24". Экран ощущается как тихий монитор состояния. Тёмный, спокойный, будто фиксирует, что связь стабильна."
  }}

vision_dialogue_screenshot_context_prompt: |
  Сообщение, которое было передано с контентом. Используй его для понимания контекста: 
  
  {user_input}
  
  Попробуй угадать из какого мессенджера или приложения эта переписка. Выведи точное содержание всех видимых сообщений. Обрезанный контент пометь с помощью "...". Если мессенджер не ясен, пиши "На скриншоте - диалог в мессенджере". 
  
  Примеры: (только для понимания стиля описания, НЕ копируй их буквально):
  - На скриншоте - диалог в telegram. Антон: "...думаю что это хорошая идея." Ольга: "Да, ты прав, это хорошая идея. Я думала еще добавить в супчик базилик." Антон: "Интересно, не пробовал добавлять базилик. Возможно надо еще добавить перец..."
  - На скриншоте - диалог с ChatGPT. User: "...думаю что это хорошая идея." ChatGPT: "Да, ты прав, это хорошая идея. Можно еще добавить в супчик базилик." User: "Интересно, не пробовал добавлять базилик. Возможно надо еще добавить перец..."
  
  Верни JSON строго следующей структуры: 
  
  {{
    "content": "..."
  }}
  
  Пример ответа: 

  {{
    "content": На скриншоте - диалог в telegram. Антон: "...думаю что это хорошая идея." Ольга: "Да, ты прав, это хорошая идея. Я думала еще добавить в супчик базилик." Антон: "Интересно, не пробовал добавлять базилик. Возможно надо еще добавить перец..."
  }}

vision_context_prompt: |
  ## Vision Content:
  Она поделилась с тобой {image_type_text}:
  {content}
  
  Возьми отсюда то, что откликается.